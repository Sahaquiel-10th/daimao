name: Deploy Admin Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "admin-web/**"
      - "deploy/nginx/daimao-admin.conf"
      - "deploy/systemd/daimao-admin-api.service"
      - "scripts/deploy-admin-web-local.sh"
      - "scripts/setup-admin-web-server.sh"

concurrency:
  group: deploy-admin-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: admin-web/package-lock.json

      - name: Build admin web
        working-directory: admin-web
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -euo pipefail
          sudo -H bash -lc '
            set -euo pipefail
            cd /root/daimao
            git config --global http.version HTTP/1.1
            git pull --ff-only origin main
            bash scripts/deploy-admin-web-local.sh
            curl -fsS http://127.0.0.1:8090/health
          '
          EOF
