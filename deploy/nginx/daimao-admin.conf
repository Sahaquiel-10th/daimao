server {
    listen 80;
    server_name _;

    root /var/www/daimao-admin/current;
    index index.html;

    access_log /var/log/nginx/daimao-admin.access.log;
    error_log /var/log/nginx/daimao-admin.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

